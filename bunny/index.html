<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Bunny Knight Atmosphere</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; margin:auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 450;
canvas.setAttribute("tabindex","0");
canvas.focus();

const gravity = 0.5;
const keys = {};
const worldWidth = 2200;
const camera = { x:0 };

// Platforms
const platforms = [
  {x:0,y:420,w:2200,h:30},
  {x:200,y:350,w:120,h:15},
  {x:400,y:300,w:120,h:15},
  {x:600,y:250,w:120,h:15},
  {x:900,y:300,w:120,h:15},
  {x:1200,y:250,w:120,h:15},
  {x:1500,y:200,w:150,h:15},
];

// Player
const player = {
  x:100,y:300,w:40,h:50,
  dx:0,dy:0,
  speed:4,dashSpeed:12,jump:-12,
  grounded:false,facing:1,
  health:5,dead:false,

  attacking:false,attackTime:0,
  dashing:false,dashTime:0,dashCooldown:0,

  invincible:false,invincibleTime:0,
  time:0
};

// Enemies
const enemies = [
  {x:800,y:380,w:40,h:40,dx:2,health:3,startX:800},
  {x:1200,y:380,w:40,h:40,dx:2,health:3,startX:1200},
  {x:1500,y:380,w:40,h:40,dx:2,health:3,startX:1500}
];

// Input
document.addEventListener("keydown", e=>{
  if(e.code==="KeyA") return;
  keys[e.code]=true;
});
document.addEventListener("keyup", e=>{
  if(e.code==="KeyA") return;
  keys[e.code]=false;
});

// Restart
canvas.addEventListener("click", e=>{
  if(!player.dead) return;
  let mx=e.offsetX,my=e.offsetY;
  if(mx>350 && mx<550 && my>200 && my<260){
    location.reload();
  }
});

// Helpers
function isColliding(a,b){
  return a.x<b.x+b.w &&
         a.x+a.w>b.x &&
         a.y<b.y+b.h &&
         a.y+a.h>b.y;
}

function getAttackBox(){
  return {
    x: player.facing===1 ? player.x+player.w : player.x-40,
    y: player.y+5,
    w:40,h:30
  };
}

// UPDATE
function update(){
  if(player.dead) return;

  player.time = Date.now()*0.01;

  if(!player.dashing){
    if(keys["ArrowLeft"]){ player.dx=-player.speed; player.facing=-1; }
    else if(keys["ArrowRight"]){ player.dx=player.speed; player.facing=1; }
    else player.dx=0;
  }

  if(keys["Space"] && player.grounded){
    player.dy=player.jump;
    player.grounded=false;
  }

  if(!keys["Space"] && player.dy<0) player.dy*=0.6;

  if(keys["KeyQ"] && !player.attacking){
    player.attacking=true;
    player.attackTime=15;
  }

  if(player.attacking){
    player.attackTime--;
    if(player.attackTime<=0) player.attacking=false;
  }

  if((keys["ShiftLeft"]||keys["ShiftRight"]) && player.dashCooldown<=0){
    player.dashing=true;
    player.dashTime=10;
    player.dashCooldown=50;
  }

  if(player.dashing){
    player.dx=player.facing*player.dashSpeed;
    player.dy=0;
    player.dashTime--;
    if(player.dashTime<=0) player.dashing=false;
  }

  if(player.dashCooldown>0) player.dashCooldown--;

  if(!player.dashing) player.dy+=gravity;

  player.x+=player.dx;
  player.y+=player.dy;

  player.x=Math.max(0,Math.min(worldWidth-player.w,player.x));

  player.grounded=false;
  for(let p of platforms){
    if(player.x<p.x+p.w &&
       player.x+player.w>p.x &&
       player.y+player.h<=p.y+5 &&
       player.y+player.h+player.dy>=p.y){
        player.y=p.y-player.h;
        player.dy=0;
        player.grounded=true;
    }
  }

  for(let e of enemies){
    if(e.health<=0) continue;

    e.x+=e.dx;
    if(e.x<e.startX-100 || e.x>e.startX+100){
      e.dx*=-1;
    }

    if(player.attacking){
      let atk=getAttackBox();
      if(isColliding(atk,e)){
        e.health--;
        e.x+=player.facing*40;
      }
    }

    if(isColliding(player,e)){
      if(!player.invincible){
        player.health--;
        player.invincible=true;
        player.invincibleTime=40;

        if(player.health<=0){
          player.health=0;
          player.dead=true;
        }
      }
    }
  }

  if(player.invincible){
    player.invincibleTime--;
    if(player.invincibleTime<=0) player.invincible=false;
  }

  let target = player.x - canvas.width/2 + player.dx*20;
  camera.x += (target-camera.x)*0.08;

  if(camera.x<0) camera.x=0;
  if(camera.x>worldWidth-canvas.width){
    camera.x=worldWidth-canvas.width;
  }
}

// 🎨 SKY + ATMOSPHERE
function drawBackground(){
  let sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#0a0f1f");
  sky.addColorStop(1,"#1a2238");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<6;i++){
    let x = (i*400 - camera.x*0.3) % (canvas.width+400);

    ctx.globalAlpha = 0.08;
    ctx.fillStyle = "#8899cc";
    ctx.beginPath();
    ctx.arc(x,120+i*20,200,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// 🪨 GROUND
function drawPlatforms(){
  for(let p of platforms){
    let x=p.x-camera.x;
    let y=p.y;

    ctx.fillStyle="#2b2f45";
    ctx.fillRect(x,y,p.w,p.h);

    ctx.fillStyle="#6c7aa1";
    ctx.fillRect(x,y,p.w,4);

    ctx.fillStyle="#1a1d2e";
    ctx.fillRect(x,y+p.h-4,p.w,4);

    for(let i=0;i<p.w;i+=40){
      ctx.fillStyle="#23273a";
      ctx.fillRect(x+i,y+6,20,6);
    }
  }
}

// 🐰 PLAYER (same as before)
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x-camera.x+20,player.y+25);
  ctx.scale(player.facing,1);

  let t=player.time;

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.ellipse(0,5,17,22,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.ellipse(0,5,14,19,0,0,Math.PI*2);
  ctx.fill();

  let swing=Math.sin(t*4)*3;

  ctx.fillStyle="#000";
  ctx.fillRect(-9,-36+swing,7,26);
  ctx.fillRect(2,-36-swing,7,26);

  ctx.fillStyle="#fff";
  ctx.fillRect(-8,-35+swing,5,24);
  ctx.fillRect(3,-35-swing,5,24);

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.arc(5,-5,2.5,0,Math.PI*2);
  ctx.fill();

  if(player.attacking){
    let p=1-(player.attackTime/15);
    let s=-1.8+p*2.5;
    let e=s+1.4;

    ctx.globalAlpha=0.3;
    ctx.strokeStyle="#88f";
    ctx.lineWidth=12;
    ctx.beginPath();
    ctx.arc(20,0,40,s,e);
    ctx.stroke();

    ctx.globalAlpha=1;
    ctx.strokeStyle="#fff";
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.arc(20,0,35,s,e);
    ctx.stroke();
  }

  if(player.dashing){
    for(let i=0;i<4;i++){
      ctx.globalAlpha=0.15-i*0.03;
      ctx.fillStyle="#99ccff";
      ctx.beginPath();
      ctx.ellipse(-10-i*12,5,12,18,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

// 👾 ENEMIES
function drawEnemies(){
  for(let e of enemies){
    if(e.health<=0) continue;

    let x=e.x-camera.x;
    let y=e.y;

    ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.arc(x+20,y+20,22,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#c33";
    ctx.beginPath();
    ctx.arc(x+20,y+20,18,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#000";
    ctx.fillRect(x+14,y+15,4,4);
    ctx.fillRect(x+22,y+15,4,4);
  }
}

// UI
function drawUI(){
  ctx.fillStyle="white";
  ctx.fillText("HP: "+player.health,20,30);
}

// Game over
function drawGameOver(){
  ctx.fillStyle="rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="40px Arial";
  ctx.fillText("GAME OVER",350,150);

  ctx.fillStyle="#444";
  ctx.fillRect(350,200,200,60);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Opnieuw spelen",370,240);
}

// LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();
  update();
  drawPlatforms();
  drawEnemies();
  drawPlayer();
  drawUI();

  if(player.dead) drawGameOver();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
<script>
// 🎁 kans op pack
if(Math.random() < 0.4){
  let packs = parseInt(localStorage.getItem("packs")) || 0;
  packs++;
  localStorage.setItem("packs", packs);
  alert("🎁 Je hebt een pack gekregen!");
}
</script>
