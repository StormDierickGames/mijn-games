<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Bunny Knight World</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; margin:auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 450;

const gravity = 0.5;
const keys = {};
const camera = { x:0 };

let currentMap = 0;
let difficulty = 1;

// 🌍 MAPS
const maps = [
  { platforms:[{x:0,y:420,w:2000,h:30}] , bg:"#0a0f1f"},
  { platforms:[{x:0,y:420,w:2000,h:30},{x:400,y:320,w:120,h:15}] , bg:"#1a0f0f"},
  { platforms:[{x:0,y:420,w:2000,h:30},{x:600,y:280,w:120,h:15}] , bg:"#0f1a0f"}
];

// 🐰 PLAYER
const player = {
  x:100,y:300,w:40,h:50,
  dx:0,dy:0,
  speed:4,jump:-12,
  grounded:false,facing:1,
  health:5,dead:false,
  attacking:false,attackTime:0,
  invincible:false,invincibleTime:0
};

// 👾 ENEMIES
let enemies = [];

// 🎮 INPUT
document.addEventListener("keydown", e=>keys[e.code]=true);
document.addEventListener("keyup", e=>keys[e.code]=false);

// ⚔️ ATTACK BOX
function getAttackBox(){
  return {
    x: player.facing===1 ? player.x+player.w : player.x-40,
    y: player.y,
    w:40,h:30
  };
}

// 👾 SPAWN SYSTEM
function spawnEnemies(){
  if(enemies.length < 5 + difficulty){
    let type = ["slime","chaser","jumper"][Math.floor(Math.random()*3)];

    enemies.push({
      type,
      x: camera.x + canvas.width + Math.random()*200,
      y: 380,
      dx: Math.random()*2+1,
      dy:0,
      health:2 + difficulty
    });
  }
}

// UPDATE
function update(){
  if(player.dead) return;

  // movement
  if(keys["ArrowLeft"]){ player.dx=-player.speed; player.facing=-1; }
  else if(keys["ArrowRight"]){ player.dx=player.speed; player.facing=1; }
  else player.dx=0;

  if(keys["Space"] && player.grounded){
    player.dy=player.jump;
    player.grounded=false;
  }

  // attack
  if(keys["KeyQ"] && !player.attacking){
    player.attacking=true;
    player.attackTime=15;
  }

  if(player.attacking){
    player.attackTime--;
    if(player.attackTime<=0) player.attacking=false;
  }

  player.dy+=gravity;
  player.x+=player.dx;
  player.y+=player.dy;

  // platforms
  player.grounded=false;
  for(let p of maps[currentMap].platforms){
    if(player.y+player.h<=p.y &&
       player.y+player.h+player.dy>=p.y){
        player.y=p.y-player.h;
        player.dy=0;
        player.grounded=true;
    }
  }

  // 👾 enemies AI
  for(let e of enemies){

    if(e.type==="slime"){
      e.x+=e.dx;
    }

    if(e.type==="chaser"){
      let dir = player.x>e.x?1:-1;
      e.x+=dir*2;
    }

    if(e.type==="jumper"){
      e.dy+=gravity;
      e.y+=e.dy;
      if(e.y>380){ e.y=380; e.dy=-10; }
    }

    // hit enemy
    if(player.attacking){
      let atk=getAttackBox();
      if(atk.x<e.x+40 && atk.x+40>e.x && atk.y<e.y+40){
        e.health--;
      }
    }

    // damage player
    if(player.x<e.x+40 && player.x+40>e.x &&
       player.y<e.y+40 && player.y+40>e.y){
      if(!player.invincible){
        player.health--;
        player.invincible=true;
        player.invincibleTime=40;

        if(player.health<=0){
          player.dead=true;
        }
      }
    }
  }

  enemies = enemies.filter(e=>e.health>0);

  if(player.invincible){
    player.invincibleTime--;
    if(player.invincibleTime<=0) player.invincible=false;
  }

  // 🎥 camera
  camera.x += (player.x - canvas.width/2 - camera.x)*0.1;

  // 🌍 MAP SWITCH
  if(player.x > 1900){
    currentMap = (currentMap+1)%maps.length;
    player.x = 50;
    enemies = [];
    difficulty++;
  }

  spawnEnemies();
}

// DRAW
function draw(){
  ctx.fillStyle = maps[currentMap].bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // platforms
  ctx.fillStyle="#444";
  for(let p of maps[currentMap].platforms){
    ctx.fillRect(p.x-camera.x,p.y,p.w,p.h);
  }

  // player
  ctx.fillStyle="white";
  ctx.fillRect(player.x-camera.x,player.y,player.w,player.h);

  // enemies
  for(let e of enemies){
    ctx.fillStyle = e.type==="slime"?"#f55":
                    e.type==="chaser"?"#0f0":"#55f";
    ctx.fillRect(e.x-camera.x,e.y,40,40);
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("HP: "+player.health,20,30);
  ctx.fillText("Map: "+currentMap,20,50);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
