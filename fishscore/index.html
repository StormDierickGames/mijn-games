<!DOCTYPE html>
<html>
<head>
  <title>Aquarium Shooter Complete</title>
  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =================
// GAME STATE
// =================
let state = "menu";

// =================
// VIS
// =================
let fish = {
  x: 300,
  y: 300,
  size: 30,
  dir: "right"
};
let fishColor = "orange";

// =================
// SCORE
// =================
let scoreFood = 0;
let scoreMonsters = 0;

// =================
// INPUT
// =================
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if(e.key === " " && state === "playing"){
    bullets.push({
      x: fish.x,
      y: fish.y,
      vx: fish.dir === "right"?8:-8
    });
  }
});
document.addEventListener("keyup", e => keys[e.key] = false);

// =================
// OBJECTEN
// =================
let foods = [];
let monsters = [];
let bullets = [];

// =================
// SPAWN
// =================
setInterval(() => { foods.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 8 }); }, 1000);
setInterval(() => { monsters.push({ x: Math.random()<0.5?0:canvas.width, y: Math.random()*canvas.height, size: 30, speed: 1.5 }); }, 2500);

// =================
// UPDATE
// =================
function update(){
  if(state !== "playing") return;

  // bewegen & richting
  if(keys["ArrowUp"]) fish.y -= 5;
  if(keys["ArrowDown"]) fish.y += 5;
  if(keys["ArrowLeft"]){ fish.x -= 5; fish.dir="left"; }
  if(keys["ArrowRight"]){ fish.x += 5; fish.dir="right"; }

  // grenzen
  if(fish.x < fish.size) fish.x = fish.size;
  if(fish.x > canvas.width - fish.size) fish.x = canvas.width - fish.size;
  if(fish.y < fish.size/2) fish.y = fish.size/2;
  if(fish.y > canvas.height - fish.size/2) fish.y = canvas.height - fish.size/2;

  // eten
  foods = foods.filter(f => {
    let dx = fish.x - f.x;
    let dy = fish.y - f.y;
    if(Math.sqrt(dx*dx + dy*dy) < fish.size){
      fish.size += 0.5;
      scoreFood += 1;
      return false;
    }
    return true;
  });

  // kogels
  bullets.forEach(b => b.x += b.vx);
  bullets = bullets.filter(b => b.x >=0 && b.x <= canvas.width);

  // monsters
  monsters.forEach((m, mi) => {
    let dx = fish.x - m.x;
    let dy = fish.y - m.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    m.x += dx/dist * m.speed;
    m.y += dy/dist * m.speed;

    if(dist < m.size){ state = "gameover"; }

    bullets.forEach((b, bi) => {
      let dx2 = b.x - m.x;
      let dy2 = b.y - m.y;
      if(Math.sqrt(dx2*dx2 + dy2*dy2) < m.size){
        monsters.splice(mi,1);
        bullets.splice(bi,1);
        scoreMonsters += 1;
      }
    });
  });
}

// =================
// TEKENEN
// =================
function drawBackground(){
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#4ecdc4");
  grad.addColorStop(1,"#0f2027");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // bubbels
  for(let i=0;i<30;i++){
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath();
    let x = Math.random()*canvas.width;
    let y = Math.random()*canvas.height;
    let r = Math.random()*5;
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }
}

function drawFish(){
  ctx.fillStyle = fishColor;
  ctx.beginPath();
  ctx.ellipse(fish.x, fish.y, fish.size, fish.size/2, 0, 0, Math.PI*2);
  ctx.fill();

  // staart
  ctx.fillStyle = fishColor;
  ctx.beginPath();
  if(fish.dir==="right"){
    ctx.moveTo(fish.x - fish.size, fish.y);
    ctx.lineTo(fish.x - fish.size - 20, fish.y - 15);
    ctx.lineTo(fish.x - fish.size - 20, fish.y + 15);
  } else {
    ctx.moveTo(fish.x + fish.size, fish.y);
    ctx.lineTo(fish.x + fish.size + 20, fish.y - 15);
    ctx.lineTo(fish.x + fish.size + 20, fish.y + 15);
  }
  ctx.closePath();
  ctx.fill();

  // oog
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(fish.x + (fish.dir==="right"?5:-5), fish.y - 5, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(fish.x + (fish.dir==="right"?5:-5), fish.y - 5, 2, 0, Math.PI*2);
  ctx.fill();
}

function drawFood(){
  ctx.fillStyle = "yellow";
  foods.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.size,0,Math.PI*2);
    ctx.fill();
  });
}

function drawMonsters(){
  monsters.forEach(m=>{
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.ellipse(m.x,m.y,m.size,m.size/1.5,0,0,Math.PI*2);
    ctx.fill();

    // oog
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(m.x+5,m.y-5,5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(m.x+5,m.y-5,2,0,Math.PI*2);
    ctx.fill();

    // tanden
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.moveTo(m.x - m.size/2, m.y);
    ctx.lineTo(m.x - m.size/2 +5, m.y-10);
    ctx.lineTo(m.x - m.size/2 +10, m.y);
    ctx.lineTo(m.x - m.size/2 +5, m.y+10);
    ctx.closePath();
    ctx.fill();
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(b.x,b.y,5,0,Math.PI*2);
    ctx.fill();

    // gloed
    ctx.strokeStyle="rgba(0,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(b.x,b.y,10,0,Math.PI*2);
    ctx.stroke();
  });
}

function drawScore(){
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Eten: "+scoreFood,20,30);
  ctx.fillText("Monsters: "+scoreMonsters,20,60);
}

function drawMenu(){
  ctx.fillStyle="white";
  ctx.font="40px Arial";
  ctx.fillText("Aquarium Shooter",canvas.width/2 - 180,canvas.height/2 - 50);
  ctx.font="20px Arial";
  ctx.fillText("Klik om te starten",canvas.width/2 - 90,canvas.height/2);
}

function drawGameOver(){
  ctx.fillStyle="white";
  ctx.font="50px Arial";
  ctx.fillText("GAME OVER",canvas.width/2 - 150,canvas.height/2);
  ctx.font="20px Arial";
  ctx.fillText("Score: Eten="+scoreFood+", Monsters="+scoreMonsters,canvas.width/2 - 150,canvas.height/2 + 40);
}

// =================
// CLICK
// =================
canvas.addEventListener("click",()=>{
  if(state==="menu") state="playing";
  else if(state==="gameover") location.reload();
});

// =================
// LOOP
// =================
function draw(){
  drawBackground();
  if(state==="menu") drawMenu();
  if(state==="playing"){
    drawFood();
    drawMonsters();
    drawBullets();
    drawFish();
    drawScore();
  }
  if(state==="gameover") drawGameOver();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
