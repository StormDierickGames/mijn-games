<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel Runner X</title>
<style>
  :root{
    --bg1:#8fd9ff;
    --bg2:#dff7ff;
    --bg3:#2a3450;
    --bg4:#0b0d13;
    --panel:rgba(8,10,16,.92);
    --panel2:rgba(20,24,35,.96);
    --line:rgba(255,255,255,.14);
    --text:#f7fbff;
    --muted:#aab5cb;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 22%,var(--bg3) 32%,var(--bg4) 100%);
    color:var(--text);
    font-family:monospace;
  }
  body{touch-action:manipulation}
  .wrap{
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    padding:12px;
  }
  .frame{
    position:relative;
    width:min(96vw,520px);
    aspect-ratio:2/3;
  }
  canvas{
    width:100%;
    height:100%;
    display:block;
    border-radius:22px;
    border:2px solid rgba(255,255,255,.42);
    image-rendering:pixelated;
    background:#000;
    box-shadow:0 28px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05) inset;
  }
  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
    font-size:12px;
    text-shadow:0 1px 0 rgba(0,0,0,.45);
  }
  .hud-box{
    background:rgba(0,0,0,.26);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    padding:8px 10px;
    backdrop-filter:blur(5px);
  }
  .overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    background:linear-gradient(rgba(2,4,10,.42),rgba(2,4,10,.74));
    border-radius:22px;
  }
  .panel{
    width:min(100%,390px);
    max-height:94%;
    overflow:auto;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 18px 55px rgba(0,0,0,.55);
    padding:16px;
    text-align:left;
    backdrop-filter:blur(6px);
  }
  h1,h2,p{margin:0 0 10px}
  h1{font-size:28px;text-align:center}
  h2{font-size:20px}
  p{color:var(--muted);line-height:1.4}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .btn{
    appearance:none;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(180deg,#2b3244,#171c2a);
    color:var(--text);
    border-radius:12px;
    padding:10px 12px;
    font:inherit;
    cursor:pointer;
    flex:1 1 120px;
    min-height:42px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{border-color:rgba(124,247,255,.28)}
  .btn.small{flex:0 0 auto;min-width:92px}
  .btn:disabled{opacity:.7;cursor:default}
  .shop-item{
    margin:10px 0;
    padding:12px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:var(--panel2);
  }
  .shop-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    margin-bottom:8px;
  }
  .swatch{
    width:26px;
    height:26px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,.2);
    flex:0 0 auto;
  }
  .legend{
    display:grid;
    gap:6px;
    margin-top:8px;
    font-size:12px;
    color:var(--muted);
  }
  #controls{
    position:absolute;
    left:0;
    right:0;
    bottom:12px;
    display:none;
    justify-content:center;
    gap:10px;
    padding:0 12px;
  }
  .ctrl{
    width:64px;
    height:64px;
    border-radius:18px;
    font-size:20px;
    background:rgba(14,16,24,.72);
    border:1px solid rgba(255,255,255,.14);
    color:white;
    touch-action:manipulation;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="frame">
    <canvas id="game" width="240" height="360"></canvas>

    <div id="hud">
      <div class="hud-box" id="hudLeft">Score: 0<br>Coins: 0</div>
      <div class="hud-box" id="hudRight">Best: 0<br>Skin: Classic</div>
    </div>

    <div id="menuOverlay" class="overlay">
      <div class="panel" id="menuPanel"></div>
    </div>

    <div id="controls">
      <button class="ctrl" id="btnLeft">⬅️</button>
      <button class="ctrl" id="btnJump">⬆️</button>
      <button class="ctrl" id="btnDuck">⬇️</button>
      <button class="ctrl" id="btnRight">➡️</button>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const hudLeft = document.getElementById('hudLeft');
  const hudRight = document.getElementById('hudRight');
  const menuOverlay = document.getElementById('menuOverlay');
  const menuPanel = document.getElementById('menuPanel');
  const controls = document.getElementById('controls');

  const LS = {
    coins: 'runnerx_coins_final2',
    best: 'runnerx_best_final2',
    skins: 'runnerx_skins_final2',
    selected: 'runnerx_selected_skin_final2',
    reward: 'runnerx_daily_reward_final2'
  };

  const ROAD = {
    topY: 112,
    groundY: canvas.height - 36,
    topWidth: 84,
    bottomWidth: 214
  };

  const SKINS = [
    { name: 'Classic', price: 0, body: '#27d8ff', head: '#eefcff', accent: '#ffffff', glow: 'rgba(39,216,255,0.24)' },
    { name: 'Neon',    price: 120, body: '#8f63ff', head: '#f1ecff', accent: '#9efcff', glow: 'rgba(143,99,255,0.26)' },
    { name: 'Lava',    price: 180, body: '#ff5d4d', head: '#fff0e8', accent: '#ffd166', glow: 'rgba(255,93,77,0.28)' },
    { name: 'Ice',     price: 220, body: '#63e6ff', head: '#f6feff', accent: '#dffcff', glow: 'rgba(99,230,255,0.26)' },
    { name: 'Gold',    price: 300, body: '#f1c74a', head: '#fff7d8', accent: '#fff1a8', glow: 'rgba(241,199,74,0.30)' }
  ];

  function readJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  }

  let coins = Number(localStorage.getItem(LS.coins) || 0);
  let bestScore = Number(localStorage.getItem(LS.best) || 0);
  let ownedSkins = readJSON(LS.skins, ['Classic']);
  let selectedSkin = localStorage.getItem(LS.selected) || 'Classic';
  if (!ownedSkins.includes(selectedSkin)) selectedSkin = 'Classic';

  const state = {
    mode: 'menu',
    score: 0,
    speed: 2.1,
    spawnTimer: 24,
    roadScroll: 0,
    paused: false,
    rewardText: '',
    rewardTimer: 0
  };

  const player = {
    lane: 1,
    targetLane: 1,
    jumpOffset: 0,
    vy: 0,
    jumping: false,
    ducking: false,
    w: 18,
    hStand: 28,
    hDuck: 16
  };

  let obstacles = [];
  let particles = [];

  function saveProgress() {
    localStorage.setItem(LS.coins, String(coins));
    localStorage.setItem(LS.best, String(bestScore));
    localStorage.setItem(LS.skins, JSON.stringify(ownedSkins));
    localStorage.setItem(LS.selected, selectedSkin);
  }

  function currentSkin() {
    return SKINS.find(s => s.name === selectedSkin) || SKINS[0];
  }

  function updateHUD() {
    hudLeft.innerHTML = `Score: ${state.score}<br>Coins: ${coins}`;
    hudRight.innerHTML = `Best: ${bestScore}<br>Skin: ${selectedSkin}`;
  }

  function roadWidthAtY(y) {
    const t = Math.max(0, Math.min(1, (y - ROAD.topY) / (ROAD.groundY - ROAD.topY)));
    return ROAD.topWidth + (ROAD.bottomWidth - ROAD.topWidth) * t;
  }

  function laneCenter(lane, y) {
    const w = roadWidthAtY(y);
    const left = (canvas.width - w) / 2;
    const laneW = w / 3;
    return left + laneW * (lane + 0.5);
  }

  function roadYFromDepth(depth) {
    return ROAD.topY + depth * (ROAD.groundY - ROAD.topY);
  }

  function normalizeLane() {
    player.lane = Math.max(0, Math.min(2, player.lane));
    player.targetLane = Math.max(0, Math.min(2, player.targetLane));
  }

  function setMode(mode) {
    state.mode = mode;
    if (mode === 'game') {
      menuOverlay.style.display = 'none';
      controls.style.display = 'flex';
    } else {
      controls.style.display = 'none';
      menuOverlay.style.display = 'flex';
    }
    updateHUD();
  }

  function resetRun() {
    state.score = 0;
    state.speed = 2.1;
    state.spawnTimer = 24;
    state.roadScroll = 0;
    state.paused = false;
    state.rewardText = '';
    state.rewardTimer = 0;

    player.lane = 1;
    player.targetLane = 1;
    player.jumpOffset = 0;
    player.vy = 0;
    player.jumping = false;
    player.ducking = false;
    normalizeLane();

    obstacles = [];
    particles = [];
  }

  function startGame() {
    resetRun();
    setMode('game');
  }

  function showMenu() {
    setMode('menu');
    renderMenu();
  }

  function showShop() {
    setMode('shop');
    renderShop();
  }

  function getRewardMsLeft() {
    const last = Number(localStorage.getItem(LS.reward) || 0);
    const day = 24 * 60 * 60 * 1000;
    return Math.max(0, day - (Date.now() - last));
  }

  function formatMs(ms) {
    const total = Math.ceil(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function claimDailyReward() {
    const left = getRewardMsLeft();
    if (left > 0) {
      state.rewardText = `Kom terug over ${formatMs(left)}`;
      state.rewardTimer = 120;
      showMenu();
      return;
    }
    coins += 100;
    localStorage.setItem(LS.reward, String(Date.now()));
    state.rewardText = '+100 coins!';
    state.rewardTimer = 120;
    saveProgress();
    updateHUD();
    showMenu();
  }

  function gameOver() {
    const earned = Math.max(0, Math.floor(state.score / 12));
    coins += earned;
    if (state.score > bestScore) bestScore = state.score;
    saveProgress();
    updateHUD();

    setMode('gameover');
    menuPanel.innerHTML = `
      <h2>Game Over</h2>
      <p>Score: <strong>${state.score}</strong></p>
      <p>Coins earned: <strong>${earned}</strong></p>
      <p>Best: <strong>${bestScore}</strong></p>
      <div class="row" style="margin: 14px 0 10px;">
        <button class="btn primary" onclick="startGame()">Opnieuw spelen</button>
        <button class="btn" onclick="showMenu()">Menu</button>
      </div>
    `;
  }

  function renderMenu() {
    const skin = currentSkin();
    const rewardLeft = getRewardMsLeft();
    const rewardLabel = rewardLeft <= 0 ? 'Claim daily reward' : `Daily reward: ${formatMs(rewardLeft)}`;

    menuPanel.innerHTML = `
      <h1>Pixel Runner X</h1>
      <p>Spring over lage obstakels, duik onder hoge obstakels en verzamel coins.</p>
      <div class="row" style="margin: 12px 0 12px;">
        <button class="btn primary" onclick="startGame()">Start Game</button>
        <button class="btn" onclick="showShop()">Shop</button>
      </div>
      <div class="row" style="margin: 0 0 12px;">
        <button class="btn" onclick="claimDailyReward()">${rewardLabel}</button>
      </div>
      <div class="shop-item">
        <div class="shop-top">
          <strong>Huidige skin</strong>
          <span class="swatch" style="background:${skin.body}"></span>
        </div>
        <div style="display:flex; gap:10px; align-items:center; justify-content:space-between;">
          <div>
            <div><strong>${selectedSkin}</strong></div>
            <div style="color:var(--muted); font-size:12px;">Coins: ${coins} · Best: ${bestScore}</div>
          </div>
          <button class="btn small" onclick="showShop()">Kiezen</button>
        </div>
      </div>
      <div class="legend">
        <div>⬅️ ➡️ wissel lanes</div>
        <div>⬆️ spring over lage obstakels</div>
        <div>⬇️ duik onder hoge obstakels</div>
        <div>P pauzeert de game</div>
        <div>Op mobiel gebruik de knoppen onderaan</div>
      </div>
    `;
    updateHUD();
  }

  function renderShop() {
    const items = SKINS.map(skin => {
      const owned = ownedSkins.includes(skin.name);
      const selected = selectedSkin === skin.name;
      const action = owned ? (selected ? 'Geselecteerd' : 'Selecteer') : `Koop (${skin.price})`;
      const disabled = owned && selected ? 'disabled' : '';
      return `
        <div class="shop-item">
          <div class="shop-top">
            <div style="display:flex; gap:10px; align-items:center;">
              <span class="swatch" style="background:${skin.body}"></span>
              <div>
                <strong>${skin.name}</strong><br>
                <span style="color:var(--muted); font-size:12px;">${owned ? 'Owned' : skin.price + ' coins'}</span>
              </div>
            </div>
            <button class="btn small" ${disabled} onclick="buyOrSelectSkin('${skin.name}')">${action}</button>
          </div>
        </div>
      `;
    }).join('');

    menuPanel.innerHTML = `
      <h2>Skin Shop</h2>
      <p>Koop skins, kleuren en glow. Alles blijft opgeslagen.</p>
      <div style="margin-bottom:12px; color:var(--muted);">Coins: ${coins}</div>
      ${items}
      <div class="row" style="margin-top:12px;">
        <button class="btn" onclick="showMenu()">Terug</button>
      </div>
    `;
  }

  function buyOrSelectSkin(name) {
    const skin = SKINS.find(s => s.name === name);
    if (!skin) return;
    if (ownedSkins.includes(name)) {
      selectedSkin = name;
      saveProgress();
      renderShop();
      updateHUD();
      return;
    }
    if (coins >= skin.price) {
      coins -= skin.price;
      ownedSkins.push(name);
      selectedSkin = name;
      saveProgress();
      renderShop();
      updateHUD();
    }
  }

  function moveLane(dir) {
    if (state.mode !== 'game' || state.paused) return;
    player.targetLane += dir;
    normalizeLane();
  }

  function jump() {
    if (state.mode !== 'game' || state.paused) return;
    if (!player.jumping && !player.ducking) {
      player.vy = 7.4;
      player.jumping = true;
    }
  }

  function duck(on) {
    if (state.mode !== 'game' || state.paused) return;
    if (on) {
      if (!player.jumping) player.ducking = true;
    } else {
      player.ducking = false;
    }
  }

  function togglePause() {
    if (state.mode !== 'game') return;
    state.paused = !state.paused;
    if (state.paused) {
      menuOverlay.style.display = 'flex';
      menuPanel.innerHTML = `
        <h2>Pauze</h2>
        <p>De game is gepauzeerd.</p>
        <div class="row" style="margin-top:12px;">
          <button class="btn primary" onclick="togglePause()">Verder spelen</button>
          <button class="btn" onclick="showMenu()">Menu</button>
        </div>
      `;
    } else {
      menuOverlay.style.display = 'none';
    }
  }

  function spawnObstacle() {
    const lane = Math.floor(Math.random() * 3);
    const type = Math.random() < 0.58 ? 'low' : 'high';
    const moving = Math.random() < 0.20;
    obstacles.push({
      lane,
      depth: 0,
      type,
      moving,
      wiggle: Math.random() * Math.PI * 2,
      speed: 0.012 + Math.random() * 0.006,
      collected: false
    });

    if (Math.random() < 0.25) {
      obstacles.push({
        lane: Math.floor(Math.random() * 3),
        depth: 0,
        type: 'coin',
        moving: false,
        wiggle: 0,
        speed: 0.014,
        collected: false
      });
    }
  }

  function playerRect() {
    const playerY = ROAD.groundY - 10;
    const h = player.ducking ? player.hDuck : player.hStand;
    return {
      x: laneCenter(Math.round(player.lane), playerY) - player.w / 2 + 3,
      y: playerY - h - player.jumpOffset + 4,
      w: player.w - 6,
      h: h - 6
    };
  }

  function obstacleRect(o) {
    const yCenter = roadYFromDepth(o.depth);
    const scale = 0.55 + o.depth * 0.80;

    let baseW = 28;
    let baseH = 22;
    if (o.type === 'high') { baseW = 34; baseH = 14; }
    if (o.type === 'coin') { baseW = 12; baseH = 12; }

    const w = baseW * scale;
    const h = baseH * scale;
    const x = laneCenter(o.lane, yCenter) - w / 2;

    let y;
    if (o.type === 'low') {
      y = yCenter - h;
    } else if (o.type === 'high') {
      y = yCenter - h - 20;
    } else {
      y = yCenter - h - 38;
    }

    return { x, y, w, h };
  }

  function intersects(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function spawnParticles(x, y, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 8,
        y: y + (Math.random() - 0.5) * 8,
        vx: (Math.random() - 0.5) * 2.2,
        vy: -1.2 - Math.random() * 1.8,
        life: 24 + Math.random() * 14,
        r: 2 + Math.random() * 1.5
      });
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.07;
      p.life -= 1;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updatePlayer() {
    const gravity = 0.42;
    player.vy -= gravity;
    player.jumpOffset += player.vy;

    if (player.jumpOffset <= 0) {
      player.jumpOffset = 0;
      player.vy = 0;
      player.jumping = false;
    }

    if (player.jumping) player.ducking = false;

    player.lane += (player.targetLane - player.lane) * 0.24;
    if (Math.abs(player.targetLane - player.lane) < 0.01) player.lane = player.targetLane;
    normalizeLane();
  }

  function applyCollisionLogic() {
    const pr = playerRect();
    const laneRound = Math.round(player.lane);

    for (const o of obstacles) {
      if (o.collected) continue;

      if (o.type === 'coin') {
        const or = obstacleRect(o);
        if (laneRound === o.lane && intersects(pr, or)) {
          o.collected = true;
          coins += 1;
          spawnParticles(or.x + or.w / 2, or.y + or.h / 2, 5);
          saveProgress();
          updateHUD();
        }
        continue;
      }

      if (laneRound !== o.lane) continue;

      const or = obstacleRect(o);
      if (o.depth <= 0.75) continue; // eerlijker: pas dichtbij collision

      if (!intersects(pr, or)) continue;

      if (o.type === 'low') {
        if (player.jumpOffset <= 6) {
          gameOver();
          return;
        }
      } else if (o.type === 'high') {
        if (!player.ducking) {
          gameOver();
          return;
        }
      }
    }
  }

  function drawSkyAndCity() {
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#8edcff');
    bg.addColorStop(0.22, '#dff7ff');
    bg.addColorStop(0.34, '#4560a0');
    bg.addColorStop(0.52, '#181d30');
    bg.addColorStop(1, '#080a10');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const sun = ctx.createRadialGradient(178, 62, 4, 178, 62, 54);
    sun.addColorStop(0, 'rgba(255,250,210,0.95)');
    sun.addColorStop(0.35, 'rgba(255,230,160,0.45)');
    sun.addColorStop(1, 'rgba(255,230,160,0)');
    ctx.fillStyle = sun;
    ctx.beginPath();
    ctx.arc(178, 62, 54, 0, Math.PI * 2);
    ctx.fill();

    const clouds = [[30,42,1.0],[82,24,0.7],[150,38,0.9],[210,20,0.7]];
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    clouds.forEach(([x, y, s], i) => {
      const ox = (state.roadScroll * 0.06 + i * 12) % 260;
      const px = ((x + ox) % 260) - 20;
      ctx.beginPath();
      ctx.ellipse(px, y, 18 * s, 10 * s, 0, 0, Math.PI * 2);
      ctx.ellipse(px + 20, y - 4, 14 * s, 8 * s, 0, 0, Math.PI * 2);
      ctx.ellipse(px + 34, y, 16 * s, 9 * s, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    const skylineY = 112;
    ctx.fillStyle = '#131a27';
    for (let i = 0; i < 7; i++) {
      const bx = i * 38 + ((i % 2) * 4);
      const bw = 16 + (i % 3) * 10;
      const bh = 24 + (i % 4) * 12;
      ctx.fillRect(bx, skylineY - bh, bw, bh);
      ctx.fillStyle = 'rgba(255,255,255,0.13)';
      for (let w = 0; w < 3; w++) {
        ctx.fillRect(bx + 3, skylineY - bh + 5 + w * 7, 3, 3);
      }
      ctx.fillStyle = '#131a27';
    }

    const haze = ctx.createLinearGradient(0, 90, 0, 170);
    haze.addColorStop(0, 'rgba(255,255,255,0.16)');
    haze.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, 82, canvas.width, 90);
  }

  function drawRoad() {
    const cx = canvas.width / 2;
    const roadGrad = ctx.createLinearGradient(0, ROAD.topY, 0, ROAD.groundY);
    roadGrad.addColorStop(0, '#404857');
    roadGrad.addColorStop(0.45, '#2b313d');
    roadGrad.addColorStop(1, '#1b1f28');
    ctx.fillStyle = roadGrad;

    ctx.beginPath();
    ctx.moveTo(cx - ROAD.topWidth / 2, ROAD.topY);
    ctx.lineTo(cx + ROAD.topWidth / 2, ROAD.topY);
    ctx.lineTo(cx + ROAD.bottomWidth / 2, ROAD.groundY);
    ctx.lineTo(cx - ROAD.bottomWidth / 2, ROAD.groundY);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.42)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - ROAD.topWidth / 2, ROAD.topY);
    ctx.lineTo(cx - ROAD.bottomWidth / 2, ROAD.groundY);
    ctx.moveTo(cx + ROAD.topWidth / 2, ROAD.topY);
    ctx.lineTo(cx + ROAD.bottomWidth / 2, ROAD.groundY);
    ctx.stroke();

    state.roadScroll %= 36;
    for (let y = ROAD.topY - 36 + state.roadScroll; y < ROAD.groundY; y += 36) {
      const p = (y - ROAD.topY) / (ROAD.groundY - ROAD.topY);
      if (p < 0 || p > 1) continue;
      const w = ROAD.topWidth + (ROAD.bottomWidth - ROAD.topWidth) * p;
      const left = cx - w / 2;
      const laneW = w / 3;
      [1,2].forEach(idx => {
        const x = left + laneW * idx;
        const segW = 12 + p * 18;
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.fillRect(x - segW / 2, y, segW, 4);
      });
    }

    ctx.strokeStyle = 'rgba(124,247,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 7; i++) {
      const yy = 118 + ((i * 38 + state.roadScroll * 1.8) % 170);
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(12, yy + 4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(canvas.width - 12, yy + 4);
      ctx.lineTo(canvas.width, yy);
      ctx.stroke();
    }
  }

  function drawPlayer() {
    const skin = currentSkin();
    const playerY = ROAD.groundY - 10; // meer naar voren
    const h = player.ducking ? player.hDuck : player.hStand;
    const x = laneCenter(Math.round(player.lane), playerY) - player.w / 2 + 3;
    const y = playerY - h - player.jumpOffset + 4;

    ctx.fillStyle = 'rgba(0,0,0,0.36)';
    ctx.beginPath();
    ctx.ellipse(x + player.w / 2, ROAD.groundY + 8, player.ducking ? 12 : 11, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = skin.glow;
    ctx.fillRect(x - 3, y - 3, player.w + 6, h + 6);

    ctx.fillStyle = skin.head;
    ctx.fillRect(x + 5, y + 1, 8, 8);

    ctx.fillStyle = skin.body;
    ctx.fillRect(x + 4, y + 9, 10, Math.max(6, h - 14));

    ctx.fillStyle = skin.accent;
    if (player.ducking) {
      ctx.fillRect(x + 2, y + 9, 4, 6);
      ctx.fillRect(x + 12, y + 9, 4, 6);
      ctx.fillRect(x + 4, y + h - 4, 4, 4);
      ctx.fillRect(x + 10, y + h - 4, 4, 4);
    } else {
      ctx.fillRect(x + 2, y + 12, 4, 10);
      ctx.fillRect(x + 14, y + 12, 4, 10);
      ctx.fillRect(x + 4, y + h - 4, 4, 4);
      ctx.fillRect(x + 10, y + h - 4, 4, 4);
    }

    ctx.fillStyle = '#10131c';
    ctx.fillRect(x + 2, y + h - 2, 6, 3);
    ctx.fillRect(x + 10, y + h - 2, 6, 3);
  }

  function drawObstacle(o) {
    const r = obstacleRect(o);
    const skin = currentSkin();
    const wobble = o.moving ? Math.sin(o.wiggle) * 1.3 : 0;

    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.fillRect(r.x + 2, r.y + r.h + 2, r.w - 4, 3);

    if (o.type === 'low') {
      const grad = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
      grad.addColorStop(0, '#ff9a8c');
      grad.addColorStop(1, '#ff3b30');
      ctx.fillStyle = grad;
      ctx.fillRect(r.x + wobble, r.y, r.w, r.h);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(r.x + 2 + wobble, r.y + 2, r.w - 4, 4);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 11px monospace';
      ctx.fillText('↑', Math.round(r.x + r.w / 2 - 4), Math.round(r.y - 4));
    } else if (o.type === 'high') {
      const barY = r.y;
      const barH = Math.max(10, r.h);
      const grad = ctx.createLinearGradient(r.x, barY, r.x, barY + barH);
      grad.addColorStop(0, '#ffe08a');
      grad.addColorStop(1, '#ff9f1c');
      ctx.fillStyle = grad;
      ctx.fillRect(r.x + wobble, barY, r.w, barH);
      ctx.fillStyle = '#69440d';
      ctx.fillRect(r.x + 1 + wobble, barY + barH - 2, 3, 12);
      ctx.fillRect(r.x + r.w - 4 + wobble, barY + barH - 2, 3, 12);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 11px monospace';
      ctx.fillText('↓', Math.round(r.x + r.w / 2 - 4), Math.round(barY + barH + 14));
    } else if (o.type === 'coin') {
      ctx.fillStyle = '#ffd84d';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = '#fff6a8';
      ctx.fillRect(r.x + 2, r.y + 2, r.w - 4, r.h - 4);
    }

    if (o.moving) {
      ctx.fillStyle = skin.accent;
      ctx.fillRect(r.x + r.w / 2 - 1, r.y + 5, 2, 2);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = 'rgba(255,208,82,0.92)';
      ctx.fillRect(p.x, p.y, p.r, p.r);
    }
  }

  function drawRewardText() {
    if (!state.rewardText) return;
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.fillRect(52, 160, 136, 24);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText(state.rewardText, 60, 176);
  }

  function drawFrame() {
    drawSkyAndCity();
    drawRoad();

    const vignette = ctx.createRadialGradient(120, 165, 60, 120, 165, 240);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.20)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    obstacles.forEach(drawObstacle);
    drawParticles();
    if (state.mode !== 'menu') drawPlayer();

    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(10, 10, 132, 34);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('Rood = springen', 16, 24);
    ctx.fillText('Oranje = duiken', 16, 36);

    drawRewardText();
  }

  function updateGame() {
    if (state.mode !== 'game' || state.paused) return;

    updatePlayer();
    updateParticles();

    state.score += 1;
    state.speed += 0.0005;
    if (state.speed > 4) state.speed = 4;

    state.roadScroll += state.speed * 1.65;

    if (state.rewardTimer > 0) state.rewardTimer--;
    if (state.rewardText && state.rewardTimer <= 0) state.rewardText = '';

    state.spawnTimer--;
    if (state.spawnTimer <= 0) {
      spawnObstacle();
      state.spawnTimer = 21 + Math.floor(Math.random() * 26);
    }

    for (const o of obstacles) {
      o.depth += o.speed;
      if (o.moving) o.wiggle += 0.08;
    }

    applyCollisionLogic();
    obstacles = obstacles.filter(o => o.depth < 1.12 && !o.collected);
    if (state.score > bestScore) bestScore = state.score;
    updateHUD();
  }

  function mainLoop() {
    if (state.mode === 'game' && !state.paused) updateGame();
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawFrame();
    ctx.restore();
    requestAnimationFrame(mainLoop);
  }

  function bindButton(id, down, up) {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      down();
      if (el.setPointerCapture) el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointerup', e => {
      e.preventDefault();
      if (up) up();
    });
    el.addEventListener('pointercancel', e => {
      e.preventDefault();
      if (up) up();
    });
    el.addEventListener('pointerleave', e => {
      if (e.buttons === 0 && up) up();
    });
  }

  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.key === 'ArrowLeft') moveLane(-1);
    if (e.key === 'ArrowRight') moveLane(1);
    if (e.key === 'ArrowUp') jump();
    if (e.key === 'ArrowDown') duck(true);
    if (e.key === 'p' || e.key === 'P') togglePause();
    if (e.key === 'Escape') {
      if (state.mode === 'game') showMenu();
      else if (state.mode === 'gameover' || state.mode === 'shop' || state.mode === 'menu') showMenu();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowDown') duck(false);
  });

  bindButton('btnLeft', () => moveLane(-1));
  bindButton('btnRight', () => moveLane(1));
  bindButton('btnJump', () => jump());
  bindButton('btnDuck', () => duck(true), () => duck(false));

  window.startGame = startGame;
  window.showMenu = showMenu;
  window.showShop = showShop;
  window.buyOrSelectSkin = buyOrSelectSkin;
  window.claimDailyReward = claimDailyReward;
  window.togglePause = togglePause;

  function init() {
    updateHUD();
    showMenu();
    mainLoop();
  }

  init();
})();
</script>
