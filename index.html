<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a8a, #020617);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

/* zoekbalk */
#search {
  margin-top: 10px;
  padding: 12px;
  width: 80%;
  max-width: 320px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

/* menu grid */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* game blok */
.game {
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

.game:hover {
  background: #334155;
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<!-- 🎮 GAMES -->
<div class="menu">

  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy Clicker</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland Simulator</a>

  <!-- 🔥 NIEUWE GAME -->
  <a href="runner/index.html" class="game">🏃 Pixel Runner X</a>

</div>

<script>
// 🔍 zoek functie
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let val = search.value.toLowerCase();

  games.forEach(g => {
    g.style.display = g.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});
</script>

</body>
</html>
