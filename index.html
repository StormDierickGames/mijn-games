<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Mijn Games</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
  text-shadow: 0 0 10px cyan;
}

#search {
  padding: 12px;
  width: 250px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.game {
  width: 220px;
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  cursor: pointer;
  transition: 0.3s;
}

.game:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px cyan;
}

.icon {
  font-size: 50px;
}
</style>
</head>

<body>

<h1>🎮 Mijn Games</h1>

<input type="text" id="search" placeholder="Zoek game..." onkeyup="searchGame()">

<div class="container">

  <div class="game" onclick="openGame('dogsnake')">
    <div class="icon">🐶</div>
    <h2>Dog Snake</h2>
  </div>

  <div class="game" onclick="openGame('fishscore')">
    <div class="icon">🐟</div>
    <h2>Fish Score</h2>
  </div>

  <div class="game" onclick="openGame('fishgame')">
    <div class="icon">🎯</div>
    <h2>Fish Game</h2>
  </div>

  <div class="game" onclick="openGame('alchemy')">
    <div class="icon">🧪</div>
    <h2>Alchemy Sandbox</h2>
  </div>

  <div class="game" onclick="openGame('boxgame')">
    <div class="icon">📦</div>
    <h2>Box Game</h2>
  </div>

  <!-- 🐰 NIEUWE GAME -->
  <div class="game" onclick="openGame('bunny')">
    <div class="icon">🐰</div>
    <h2>Bunny Knight</h2>
  </div>

</div>

<script>
function openGame(game) {
  window.location.href = "./" + game + "/index.html";
}

function searchGame() {
  let input = document.getElementById("search").value.toLowerCase();
  let games = document.querySelectorAll(".game");

  games.forEach(game => {
    let text = game.innerText.toLowerCase();
    game.style.display = text.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
