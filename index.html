<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* collectie knop */
#collectionBtn {
  position: fixed;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* collectie menu */
#collection {
  position: fixed;
  left: -100%;
  top: 0;
  width: 250px;
  height: 100%;
  background: #020617;
  transition: 0.3s;
  overflow-y: auto;
  padding: 15px;
}

#collection.open {
  left: 0;
}

.card {
  background: #1e293b;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
}

/* menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  background: #1e293b;
  border-radius: 15px;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>

<!-- 🎴 knop -->
<div id="collectionBtn" onclick="toggleCollection()">🎴</div>

<!-- 🎴 collectie -->
<div id="collection">
  <h2>🎴 Jouw collectie</h2>
  <div id="cards"></div>
</div>

<!-- 🎮 games -->
<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>
</div>

<script>
// 🎴 alle kaarten
const allCards = [
  "🐰 Bunny Master",
  "📦 Box King",
  "🐟 Fish Pro",
  "🐍 Snake God",
  "🧱 Builder",
  "🐶 Puppy Boss",
  "🧩 Maze Brain",
  "🌴 Island Creator",
  "🔥 LEGENDARY"
];

// 💾 load
let myCards = JSON.parse(localStorage.getItem("cards")) || [];

// 🎴 render
function renderCards(){
  const container = document.getElementById("cards");
  container.innerHTML = "";

  myCards.forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card;
    container.appendChild(div);
  });
}

// 🎴 open/close
function toggleCollection(){
  document.getElementById("collection").classList.toggle("open");
}

// start
renderCards();
</script>

</body>
</html>
