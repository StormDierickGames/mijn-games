<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>StormPlay 🎮</title>

<meta name="description" content="StormPlay - Speel gratis online games!">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

#search {
  margin-top: 20px;
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: none;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.game {
  width: 200px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  background: #1e293b;
  text-decoration: none;
  color: white;
}

.game:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffff;
}

.game img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.game p {
  margin: 10px;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<div class="menu" id="menu">

  <a href="bunny/index.html" class="game">
    <img src="https://picsum.photos/300/200?1">
    <p>Bunny Knight</p>
  </a>

  <a href="boxgame/index.html" class="game">
    <img src="https://picsum.photos/300/200?2">
    <p>Box Game</p>
  </a>

  <a href="fishscore/index.html" class="game">
    <img src="https://picsum.photos/300/200?3">
    <p>Fish Score</p>
  </a>

  <!-- 🐶 NIEUWE GAME -->
  <a href="puppy/index.html" class="game">
    <img src="https://picsum.photos/300/200?puppy">
    <p>Puppy Clicker 🐶</p>
  </a>

</div>

<script>
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let value = search.value.toLowerCase();

  games.forEach(game => {
    let text = game.innerText.toLowerCase();

    game.style.display = text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
