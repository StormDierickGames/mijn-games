<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Mijn Games</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
  transition: 0.5s;
}

h1 {
  margin: 20px;
  text-shadow: 0 0 10px cyan;
}

#search {
  padding: 12px;
  width: 250px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

/* 🎨 KLEUR KNOPPEN */
.colors {
  margin-bottom: 20px;
}

.colorBtn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  margin: 5px;
  cursor: pointer;
  transition: 0.2s;
}

.colorBtn:hover {
  transform: scale(1.2);
}

/* GAMES */
.container {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.game {
  width: 220px;
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  cursor: pointer;
  transition: 0.3s;
}

.game:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px cyan;
}

.icon {
  font-size: 50px;
}
</style>
</head>

<body>

<h1>🎮 Mijn Games</h1>

<!-- 🔍 ZOEK -->
<input type="text" id="search" placeholder="Zoek game..." onkeyup="searchGame()">

<!-- 🎨 KLEUR KNOPPEN -->
<div class="colors">
  <button class="colorBtn" style="background:#020617" onclick="setBg('#020617','#0f172a')"></button>
  <button class="colorBtn" style="background:#1e3a8a" onclick="setBg('#1e3a8a','#0ea5e9')"></button>
  <button class="colorBtn" style="background:#14532d" onclick="setBg('#14532d','#22c55e')"></button>
  <button class="colorBtn" style="background:#7f1d1d" onclick="setBg('#7f1d1d','#ef4444')"></button>
  <button class="colorBtn" style="background:#581c87" onclick="setBg('#581c87','#a855f7')"></button>
</div>

<div class="container">

  <div class="game" onclick="openGame('dogsnake')">
    <div class="icon">🐶</div>
    <h2>Dog Snake</h2>
  </div>

  <div class="game" onclick="openGame('fishscore')">
    <div class="icon">🐟</div>
    <h2>Fish Score</h2>
  </div>

  <div class="game" onclick="openGame('fishgame')">
    <div class="icon">🎯</div>
    <h2>Fish Game</h2>
  </div>

  <div class="game" onclick="openGame('alchemy')">
    <div class="icon">🧪</div>
    <h2>Alchemy Sandbox</h2>
  </div>

  <div class="game" onclick="openGame('boxgame')">
    <div class="icon">📦</div>
    <h2>Box Game</h2>
  </div>

  <div class="game" onclick="openGame('bunny')">
    <div class="icon">🐰</div>
    <h2>Bunny Knight</h2>
  </div>

</div>

<script>
function openGame(game) {
  window.location.href = "./" + game + "/index.html";
}

// 🔍 zoeken
function searchGame() {
  let input = document.getElementById("search").value.toLowerCase();
  let games = document.querySelectorAll(".game");

  games.forEach(game => {
    let text = game.innerText.toLowerCase();
    game.style.display = text.includes(input) ? "block" : "none";
  });
}

// 🎨 achtergrond veranderen
function setBg(color1, color2) {
  document.body.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
}
</script>

</body>
</html>
