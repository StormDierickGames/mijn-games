<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#search {
  margin-top: 10px;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  text-decoration: none;
  color: white;
}

.colors {
  margin-top: 15px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>

<input id="search" placeholder="Zoek game...">

<!-- 🎨 kleuren -->
<div class="colors">
  <button onclick="setBg('#0f172a')">🌑</button>
  <button onclick="setBg('#1e3a8a')">🔵</button>
  <button onclick="setBg('#065f46')">🟢</button>
  <button onclick="setBg('#7c2d12')">🟠</button>
</div>

<!-- 🎮 GAMES -->
<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>
</div>

<!-- 💬 COMMENTS -->
<h2>💬 Comments</h2>

<script src="https://giscus.app/client.js"
        data-repo="StormDierickGames/mijn-games"
        data-repo-id="PASTE_HIER"
        data-category="General"
        data-category-id="PASTE_HIER"
        data-mapping="pathname"
        data-theme="dark"
        crossorigin="anonymous"
        async>
</script>

<script>
// zoek
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.oninput = () => {
  let v = search.value.toLowerCase();
  games.forEach(g => {
    g.style.display = g.innerText.toLowerCase().includes(v) ? "block" : "none";
  });
};

// achtergrond
function setBg(color){
  document.body.style.background = color;
  localStorage.setItem("bg", color);
}

window.onload = () => {
  let bg = localStorage.getItem("bg");
  if(bg) document.body.style.background = bg;
};
</script>

</body>
</html>
