<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>StormPlay 🎮</title>

<meta name="description" content="StormPlay - Speel gratis online games!">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

/* 🔍 zoekbalk */
#search {
  margin-top: 20px;
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* 🎮 menu */
.menu {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.game {
  width: 200px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  background: #1e293b;
  text-decoration: none;
  color: white;
}

.game:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffff;
}

.game img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.game p {
  margin: 10px;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<!-- 🔍 zoekbalk -->
<input type="text" id="search" placeholder="Zoek een game...">

<div class="menu" id="menu">

  <a href="bunny/index.html" class="game">
    <img src="https://picsum.photos/300/200?1">
    <p>Bunny Knight</p>
  </a>

  <a href="boxgame/index.html" class="game">
    <img src="https://picsum.photos/300/200?2">
    <p>Box Game</p>
  </a>

  <a href="fishscore/index.html" class="game">
    <img src="https://picsum.photos/300/200?3">
    <p>Fish Score</p>
  </a>

  <a href="circle/index.html" class="game">
    <img src="https://picsum.photos/300/200?4">
    <p>Circle Game</p>
  </a>

  <a href="shooter/index.html" class="game">
    <img src="https://picsum.photos/300/200?5">
    <p>Shooter</p>
  </a>

  <a href="runner/index.html" class="game">
    <img src="https://picsum.photos/300/200?6">
    <p>Runner</p>
  </a>

</div>

<script>
// 🔍 zoek functie
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let value = search.value.toLowerCase();

  games.forEach(game => {
    let text = game.innerText.toLowerCase();

    if (text.includes(value)) {
      game.style.display = "block";
    } else {
      game.style.display = "none";
    }
  });
});
</script>

</body>
</html>
