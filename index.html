<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 32px;
}

p {
  opacity: 0.75;
}

#search {
  margin-top: 15px;
  padding: 12px;
  width: 80%;
  max-width: 320px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  outline: none;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.game {
  padding: 22px 12px;
  border-radius: 18px;
  background: #1e293b;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.2s;
  box-shadow: 0 6px 16px rgba(0,0,0,0.25);
}

.game:hover {
  transform: scale(1.05);
  background: #334155;
}

.game.hidden {
  display: none;
}

@media (max-width: 500px) {
  .game {
    font-size: 17px;
    padding: 20px 10px;
  }
}
</style>
</head>
<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny Knight</a>
  <a href="boxgame/index.html" class="game">📦 Box Game</a>
  <a href="fishscore/index.html" class="game">🐟 Fish Score</a>
  <a href="dogsnake/index.html" class="game">🐍 DogSnake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy Clicker</a>
  <a href="maze/index.html" class="game">🧩 Maze Game</a>
  <a href="eiland/index.html" class="game">🌴 Eiland Simulator</a>
  <a href="runner/index.html" class="game">🏃 Pixel Runner X</a>
  <a href="slakje/index.html" class="game">🐌 Slakje 8-Bit Desktop</a>
</div>

<script>
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  const value = search.value.toLowerCase();
  games.forEach(game => {
    const text = game.innerText.toLowerCase();
    game.classList.toggle("hidden", !text.includes(value));
  });
});
</script>

</body>
</html>
