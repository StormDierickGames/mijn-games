<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  transition: background 0.5s;
}

h1 {
  margin-top: 20px;
}

/* zoekbalk */
#search {
  margin-top: 10px;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}

/* kleur knoppen */
.colors {
  margin-top: 15px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

/* menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffff;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<!-- 🎨 KLEUR KIEZEN -->
<div class="colors">
  <p>🎨 Kies achtergrond:</p>
  <button onclick="setBg('#0f172a')">🌑 Donker</button>
  <button onclick="setBg('#1e3a8a')">🔵 Blauw</button>
  <button onclick="setBg('#065f46')">🟢 Groen</button>
  <button onclick="setBg('#7c2d12')">🟠 Oranje</button>
  <button onclick="setBg('#4c1d95')">🟣 Paars</button>
</div>

<!-- 🎮 GAMES -->
<div class="menu">

  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>

</div>

<script>
// 🔍 zoek
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let val = search.value.toLowerCase();

  games.forEach(g => {
    g.style.display = g.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

// 🎨 achtergrond veranderen
function setBg(color){
  document.body.style.background = color;
  localStorage.setItem("bgColor", color);
}

// 💾 laad kleur
window.onload = () => {
  let saved = localStorage.getItem("bgColor");
  if(saved){
    document.body.style.background = saved;
  }
};
</script>

</body>
</html>
