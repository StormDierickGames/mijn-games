<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

/* zoekbalk */
#search {
  margin-top: 10px;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}

/* muziek */
.music {
  margin-top: 15px;
}

/* knoppen */
button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  background: #334155;
  color: white;
}

/* menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffff;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<!-- 🎵 MUZIEK -->
<div class="music">
  <p>🎵 Muziek kiezen:</p>
  <button onclick="playMusic('chill')">🌙 Chill</button>
  <button onclick="playMusic('game')">🔥 Game</button>
  <button onclick="playMusic('lofi')">🎧 Lofi</button>
  <button onclick="stopMusic()">⛔ Stop</button>
</div>

<!-- 🎧 zichtbare speler -->
<audio id="music" controls loop style="margin-top:10px; width:80%; max-width:300px;"></audio>

<!-- 🎮 GAMES -->
<div class="menu">

  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>

</div>

<script>
// 🔍 zoek
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let val = search.value.toLowerCase();

  games.forEach(g => {
    g.style.display = g.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

// 🎵 muziek
const music = document.getElementById("music");

function playMusic(type){
  if(type === "chill"){
    music.src = "https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f1c7c0b47.mp3";
  }
  if(type === "game"){
    music.src = "https://cdn.pixabay.com/download/audio/2022/03/10/audio_0c2a5b6f28.mp3";
  }
  if(type === "lofi"){
    music.src = "https://cdn.pixabay.com/download/audio/2022/10/25/audio_946e6c1c6b.mp3";
  }

  music.volume = 0.4;

  music.play().catch(() => {
    alert("Klik nog eens op de knop voor muziek 🔊");
  });
}

function stopMusic(){
  music.pause();
}
</script>

</body>
</html>
