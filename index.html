<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#search {
  margin: 10px;
  padding: 10px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  border-radius: 15px;
  background: #1e293b;
  text-decoration: none;
  color: white;
}

/* cards */
#cards {
  margin-top: 20px;
}

.card {
  display: inline-block;
  padding: 15px;
  margin: 5px;
  border-radius: 10px;
  background: #334155;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>

<input id="search" placeholder="Zoek game...">

<!-- 🎮 GAMES -->
<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>
</div>

<!-- 🎴 CARD SYSTEM -->
<h2>🎴 Jouw Cards</h2>

<button onclick="openPack()">🎁 Open Pack</button>

<div id="cards"></div>

<script>
// 🔍 search
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.oninput = () => {
  let v = search.value.toLowerCase();
  games.forEach(g => {
    g.style.display = g.innerText.toLowerCase().includes(v) ? "block" : "none";
  });
};

// 🎴 kaarten lijst
const allCards = [
  "🐰 Bunny Master",
  "📦 Box King",
  "🐟 Fish Pro",
  "🐍 Snake God",
  "🧱 Builder",
  "🐶 Puppy Boss",
  "🧩 Maze Brain",
  "🌴 Island Creator",
  "🔥 Legendary Player"
];

// 💾 load save
let myCards = JSON.parse(localStorage.getItem("cards")) || [];

// 🎁 open pack
function openPack(){
  let random = allCards[Math.floor(Math.random() * allCards.length)];

  if(!myCards.includes(random)){
    myCards.push(random);
    alert("🎉 Nieuwe kaart: " + random);
  } else {
    alert("😅 Duplicate kaart!");
  }

  save();
  renderCards();
}

// 💾 save
function save(){
  localStorage.setItem("cards", JSON.stringify(myCards));
}

// 🎨 render
function renderCards(){
  const container = document.getElementById("cards");
  container.innerHTML = "";

  myCards.forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card;
    container.appendChild(div);
  });
}

// start
renderCards();
</script>

</body>
</html>
