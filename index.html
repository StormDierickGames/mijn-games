<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  transition: background 0.4s;
}

/* 🎨 kleur knoppen */
.colors {
  margin-top: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* 🎴 collectie knop */
#collectionBtn {
  position: fixed;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* 🎴 collectie menu */
#collection {
  position: fixed;
  left: -100%;
  top: 0;
  width: 260px;
  height: 100%;
  background: #020617;
  transition: 0.3s;
  overflow-y: auto;
  padding: 15px;
}

#collection.open {
  left: 0;
}

.card {
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
}

/* rarity kleuren */
.common { background:#334155; }
.rare { background:#2563eb; }
.epic { background:#9333ea; }
.legendary { background:#f59e0b; }

/* 🎮 menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  background: #1e293b;
  border-radius: 15px;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>

<!-- 🎨 kleuren -->
<div class="colors">
  <button onclick="setBg('#0f172a')">🌑</button>
  <button onclick="setBg('#1e3a8a')">🔵</button>
  <button onclick="setBg('#065f46')">🟢</button>
  <button onclick="setBg('#7c2d12')">🟠</button>
  <button onclick="setBg('#4c1d95')">🟣</button>
</div>

<!-- 🎴 knop -->
<div id="collectionBtn" onclick="toggleCollection()">🎴</div>

<!-- 🎴 collectie -->
<div id="collection">
  <h2>🎴 Collectie</h2>
  <div id="cards"></div>
</div>

<!-- 🎮 games -->
<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>
</div>

<script>
// 🎨 achtergrond
function setBg(color){
  document.body.style.background = color;
  localStorage.setItem("bg", color);
}

window.onload = () => {
  let bg = localStorage.getItem("bg");
  if(bg) document.body.style.background = bg;
  renderCards();
};

// 🎴 kaarten (VEEL MEER)
const allCards = [
  {name:"🐰 Bunny Master",rarity:"common"},
  {name:"🐰 Speed Bunny",rarity:"rare"},
  {name:"📦 Box King",rarity:"common"},
  {name:"📦 Mega Box",rarity:"rare"},
  {name:"🐟 Fish Pro",rarity:"common"},
  {name:"🐟 Golden Fish",rarity:"epic"},
  {name:"🐍 Snake God",rarity:"rare"},
  {name:"🐍 Toxic Snake",rarity:"epic"},
  {name:"🧱 Builder",rarity:"common"},
  {name:"🧱 Master Builder",rarity:"rare"},
  {name:"🐶 Puppy Boss",rarity:"common"},
  {name:"🐶 Alpha Dog",rarity:"epic"},
  {name:"🧩 Maze Brain",rarity:"common"},
  {name:"🧩 Maze Wizard",rarity:"rare"},
  {name:"🌴 Island Creator",rarity:"rare"},
  {name:"🌴 Island God",rarity:"legendary"},
  {name:"🔥 Storm Legend",rarity:"legendary"}
];

// 💾 load
let myCards = JSON.parse(localStorage.getItem("cards")) || [];

// 🎴 render
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML = "";

  myCards.forEach(card=>{
    let div = document.createElement("div");
    div.className = "card " + card.rarity;
    div.innerText = card.name;
    c.appendChild(div);
  });
}

// 🎴 toggle
function toggleCollection(){
  document.getElementById("collection").classList.toggle("open");
}
</script>

</body>
</html>
