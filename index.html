<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* 🎴 knop */
#collectionBtn {
  position: fixed;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: #334155;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* 📖 collectie */
#collection {
  position: fixed;
  left: -100%;
  top: 0;
  width: 300px;
  height: 100%;
  background: #020617;
  transition: 0.3s;
  overflow-y: auto;
  padding: 15px;
}

#collection.open {
  left: 0;
}

.card {
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
}

/* 🔒 locked */
.locked {
  background: #111;
  color: #555;
}

/* rarity */
.common { background:#334155; }
.rare { background:#2563eb; }
.epic { background:#9333ea; }
.legendary { background:#f59e0b; }

/* 🎮 menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  padding: 20px;
  background: #1e293b;
  border-radius: 15px;
  text-decoration: none;
  color: white;
}

/* 🎁 pack knop */
#packBtn {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>

<!-- 🎁 pack info -->
<h3>🎁 Packs: <span id="packCount">0</span></h3>
<button id="packBtn" onclick="openPack()">Open Pack</button>

<!-- 🎴 knop -->
<div id="collectionBtn" onclick="toggleCollection()">📖</div>

<!-- 📖 collectie -->
<div id="collection">
  <h2>📖 Collectieboek</h2>
  <div id="cards"></div>
</div>

<!-- 🎮 games -->
<div class="menu">
  <a href="bunny/index.html" class="game">🐰 Bunny</a>
  <a href="boxgame/index.html" class="game">📦 Box</a>
  <a href="fishscore/index.html" class="game">🐟 Fish</a>
  <a href="dogsnake/index.html" class="game">🐍 Snake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy</a>
  <a href="maze/index.html" class="game">🧩 Maze</a>
  <a href="eiland/index.html" class="game">🌴 Eiland</a>
</div>

<script>
// 🎴 alle kaarten
const allCards = [
  {name:"🐰 Bunny Master",rarity:"common"},
  {name:"🐰 Speed Bunny",rarity:"rare"},
  {name:"📦 Box King",rarity:"common"},
  {name:"🐟 Golden Fish",rarity:"epic"},
  {name:"🐍 Snake God",rarity:"rare"},
  {name:"🧱 Builder",rarity:"common"},
  {name:"🐶 Alpha Dog",rarity:"epic"},
  {name:"🧩 Maze Wizard",rarity:"rare"},
  {name:"🌴 Island God",rarity:"legendary"},
  {name:"🔥 Storm Legend",rarity:"legendary"}
];

// 💾 load
let myCards = JSON.parse(localStorage.getItem("cards")) || [];
let packs = parseInt(localStorage.getItem("packs")) || 0;

// 🎁 update UI
function updateUI(){
  document.getElementById("packCount").innerText = packs;
}

// 🎁 open pack
function openPack(){
  if(packs <= 0){
    alert("❌ Geen packs!");
    return;
  }

  packs--;

  let drop = allCards[Math.floor(Math.random()*allCards.length)];

  if(!myCards.find(c=>c.name===drop.name)){
    myCards.push(drop);
    alert("🎉 Nieuwe kaart: " + drop.name);
  } else {
    alert("😅 Duplicate kaart!");
  }

  save();
  renderCards();
}

// 💾 save
function save(){
  localStorage.setItem("cards", JSON.stringify(myCards));
  localStorage.setItem("packs", packs);
  updateUI();
}

// 📖 render collectieboek
function renderCards(){
  const c = document.getElementById("cards");
  c.innerHTML = "";

  allCards.forEach(card=>{
    let owned = myCards.find(c=>c.name===card.name);

    let div = document.createElement("div");

    if(owned){
      div.className = "card " + card.rarity;
      div.innerText = card.name;
    } else {
      div.className = "card locked";
      div.innerText = "❓ ???";
    }

    c.appendChild(div);
  });
}

// 📖 toggle
function toggleCollection(){
  document.getElementById("collection").classList.toggle("open");
}

// start
updateUI();
renderCards();
</script>

</body>
</html>
