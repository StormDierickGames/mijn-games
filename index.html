<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ StormPlay 🎮</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 32px;
}

p {
  opacity: 0.7;
}

/* zoekbalk */
#search {
  margin-top: 15px;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

/* menu grid */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* game cards */
.game {
  padding: 25px 10px;
  border-radius: 20px;
  background: #1e293b;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffff;
}

/* mobiel groter */
@media (max-width: 500px) {
  .game {
    font-size: 20px;
    padding: 30px 10px;
  }
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<div class="menu">

  <a href="bunny/index.html" class="game">🐰 Bunny Knight</a>
  <a href="boxgame/index.html" class="game">📦 Box Game</a>
  <a href="fishscore/index.html" class="game">🐟 Fish Score</a>
  <a href="dogsnake/index.html" class="game">🐍 DogSnake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy Clicker</a>
  <a href="maze/index.html" class="game">🧩 Maze Game</a>
  <a href="eiland/index.html" class="game">🌴 Eiland Simulator</a>

</div>

<script>
// 🔍 zoekbalk
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let value = search.value.toLowerCase();

  games.forEach(game => {
    let text = game.innerText.toLowerCase();
    game.style.display = text.includes(value) ? "block" : "none";
  });
});

// 📱 PWA (app)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
