<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>⚡ StormPlay 🎮</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

#search {
  margin-top: 20px;
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: none;
}

/* MENU */
.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.game {
  width: 180px;
  padding: 20px;
  border-radius: 20px;
  background: #1e293b;
  cursor: pointer;
  transition: 0.3s;
  text-decoration: none;
  color: white;
  font-size: 18px;
}

.game:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffff;
}
</style>
</head>

<body>

<h1>⚡ StormPlay</h1>
<p>Speel. Win. Herhaal.</p>

<input type="text" id="search" placeholder="Zoek een game...">

<div class="menu">

  <a href="bunny/index.html" class="game">🐰 Bunny Knight</a>
  <a href="boxgame/index.html" class="game">📦 Box Game</a>
  <a href="fishscore/index.html" class="game">🐟 Fish Score</a>
  <a href="dogsnake/index.html" class="game">🐍 DogSnake</a>
  <a href="sandbox/index.html" class="game">🧱 Sandbox</a>
  <a href="puppy/index.html" class="game">🐶 Puppy Clicker</a>
  <a href="maze/index.html" class="game">🧩 Maze Game</a>

</div>

<script>
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
  let value = search.value.toLowerCase();

  games.forEach(game => {
    let text = game.innerText.toLowerCase();
    game.style.display = text.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
