<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>StormPlay - Puppy Clicker 🐶</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background: linear-gradient(135deg,#1d3557,#457b9d);
  color:white;
  margin:0;
}

/* TOP BAR */
#topbar{
  background:#0b132b;
  padding:10px;
  font-size:20px;
}

/* GAME CARD */
#gameBox{
  background:#ffffff10;
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  width:350px;
  margin:20px auto;
  box-shadow:0 0 20px #00000050;
}

#puppy{
  width:180px;
  cursor:pointer;
  transition:0.2s;
}
#puppy:hover{
  transform:scale(1.1);
}

/* BUTTONS */
button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#ffb703;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  background:#ffd166;
  transform:scale(1.05);
}

/* SHOP */
#shop button{
  display:block;
  width:100%;
}

/* POPUP */
#popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
  opacity:0;
  transition:0.5s;
}
#popup.show{ opacity:1; top:60px; }

/* ACHIEVEMENTS */
#ach div{
  background:#ffffff20;
  margin:3px;
  padding:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<div id="topbar">🌩️ StormPlay - Puppy Clicker 🐶</div>

<div id="gameBox">

<h2 id="user"></h2>

<div id="score">0</div>
<div id="perSec">0/sec</div>
<div id="rebirth">x1</div>

<img id="puppy" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAMAAACahl6sAAAAM1BMVEUAAAD///+ZmZnMzMz5+fn19fX8/Pz09PTy8vLx8fHv7+/u7u7s7Ozq6urh4eHd3d3b29u3t7c3YzQBAAAACXBIWXMAAA7EAAAOxAGVKw4bAAABFklEQVR4nO3QsQ2AIBAEQWf//2a2EoSxFazc2DSES0finBmMOPZmkAAAAAAAAAAAAAAAAA4G7nV9+2X2/bb7ftt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22+37bfbt9v22AAAAAAAAAAAAAAAAgP8A1VsC3XoaZy8AAAAASUVORK5CYII=">

<br>

<button onclick="claimDaily()">🎁 Daily</button>
<button onclick="rebirth()">♻️ Rebirth</button>
<button onclick="resetSave()">Reset</button>

<h3>Shop</h3>
<div id="shop"></div>

<h3>🏆 Achievements</h3>
<div id="ach"></div>

</div>

<div id="popup"></div>

<script>
let score=0, clickPower=1, rebirths=0;
let lastClaim=0, streak=0, totalClicks=0;
let username="";

const upgrades=[
{name:"Auto Puppy", base:50, amt:0, power:1, unlock:0},
{name:"Farm", base:200, amt:0, power:5, unlock:100},
{name:"Factory", base:1000, amt:0, power:20, unlock:500},
{name:"Lab", base:5000, amt:0, power:100, unlock:2000}
];

const achievements=[
{name:"First Click", check:()=>totalClicks>=1, done:false},
{name:"Rebirth", check:()=>rebirths>=1, done:false}
];

const puppy=document.getElementById("puppy");
const scoreEl=document.getElementById("score");
const perSecEl=document.getElementById("perSec");
const rebirthEl=document.getElementById("rebirth");
const shop=document.getElementById("shop");
const achEl=document.getElementById("ach");
const popup=document.getElementById("popup");
const userEl=document.getElementById("user");

function showPopup(t){
 popup.textContent=t;
 popup.classList.add("show");
 setTimeout(()=>popup.classList.remove("show"),3000);
}

function askUsername(){
 let saved=localStorage.getItem("username");
 if(saved){ username=saved; }
 else{
  username=prompt("Naam?");
  if(!username) username="Player";
  localStorage.setItem("username",username);
 }
 userEl.textContent="👤 "+username;
}

function mult(){ return 1+rebirths*0.5; }
function cost(u){ return Math.floor(u.base*Math.pow(1.15,u.amt)); }

function perSec(){
 return upgrades.reduce((s,u)=>s+u.amt*u.power,0)*mult();
}

function update(){
 scoreEl.textContent="Score: "+Math.floor(score);
 perSecEl.textContent=Math.floor(perSec())+"/sec";
 rebirthEl.textContent="Boost x"+mult().toFixed(1);

 shop.innerHTML="";
 upgrades.forEach((u,i)=>{
  if(score>=u.unlock){
    let b=document.createElement("button");
    b.textContent=u.name+" ("+u.amt+") - "+cost(u);
    b.onclick=()=>buy(i);
    shop.appendChild(b);
  }
 });

 achEl.innerHTML="";
 achievements.forEach(a=>{
  if(!a.done && a.check()){
    a.done=true;
    showPopup("🏆 "+a.name);
  }
  let d=document.createElement("div");
  d.textContent=a.done?"✅ "+a.name:"❓ ???";
  achEl.appendChild(d);
 });
}

function buy(i){
 let u=upgrades[i];
 let c=cost(u);
 if(score>=c){
  score-=c;
  u.amt++;
  update();
 }
}

puppy.onclick=()=>{
 score+=clickPower*mult();
 totalClicks++;
 update();
};

function rebirth(){
 if(score>=10000){
  if(confirm("Rebirth?")){
    rebirths++;
    score=0;
    upgrades.forEach(u=>u.amt=0);
    showPopup("🔥 Rebirth!");
    update();
  }
 }
}

function claimDaily(){
 let now=Date.now();
 if(now-lastClaim>86400000){
  streak++;
  let reward=100*streak;
  score+=reward;
  lastClaim=now;
  showPopup("+"+reward);
  update();
 }
}

setInterval(()=>{ score+=perSec(); update(); },1000);

function save(){
 localStorage.setItem("save",JSON.stringify({
  score, upgrades, rebirths, lastClaim, streak, totalClicks
 }));
}

function load(){
 let s=JSON.parse(localStorage.getItem("save"));
 if(s){
  score=s.score;
  rebirths=s.rebirths;
  lastClaim=s.lastClaim;
  streak=s.streak;
  totalClicks=s.totalClicks;
  s.upgrades.forEach((u,i)=>upgrades[i].amt=u.amt);
 }
}

function resetSave(){
 localStorage.clear();
 location.reload();
}

setInterval(save,3000);

load();
askUsername();
update();
</script>

</body>
</html>
